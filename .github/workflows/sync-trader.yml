name: Sync live trader facts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-live-trader
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync trader swaps from BSC RPC
        env:
          BSC_TRADER_WALLET: "0x55976c6818e4794f3e2e7179eea2cc2202811e11"
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL || 'https://bsc.rpc.blxrbdn.com' }}
          FOURMEME_PROGRAM_MODE: rpc
          RPC_LOG_CHUNK_SIZE: "50000"
          RPC_MAX_BLOCKS_PER_RUN: "50000"
          RPC_RECENT_BLOCKS_PER_RUN: "300000"
        run: python3 scripts/sync_trader.py --mode rpc

      - name: Commit refreshed data to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_summary.json data/live_trades.json data/live_events.json data/live_events.csv data/live_recent_buys.csv data/live_recent_positions.csv data/state/last_rpc_block.txt data/state/block_time_cache.json index.html scripts/sync_trader.py .env.example scripts/README.md
          if git diff --cached --quiet; then
            echo "No live-data changes"
          else
            git commit -m "Auto-sync live trader facts"
            git push origin main
          fi

      - name: Publish current site to gh-pages
        run: |
          tmp="$(mktemp -d)"
          git worktree add --detach "$tmp" HEAD
          cd "$tmp"
          git checkout --orphan gh-pages
          git add -A
          git commit -m "Publish live trader site"
          git push origin gh-pages --force
          cd -
          git worktree remove "$tmp" --force
